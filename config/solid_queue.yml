default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
      recurring_tasks:
        review_due_check:
          class: ReviewDueCheckJob
          schedule: "0 0 * * *"        # 매일 자정
        gift_voucher_expiry:
          class: GiftVoucherExpiryJob
          schedule: "0 0 * * *"
        waiting_expiry:
          class: WaitingExpiryJob
          schedule: "0 0 * * *"
        attendance_checkin:
          class: AttendanceCheckJob
          args: [{ check_type: "checkin" }]
          schedule: "0 13-21 * * *"    # 매일 13~21시 정각
        attendance_checkout:
          class: AttendanceCheckJob
          args: [{ check_type: "checkout" }]
          schedule: "55 13-21 * * *"   # 매일 13~21시 55분

  workers:
    - queues: "*"
      threads: 3

development:
  <<: *default

production:
  <<: *default
